<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvaro Waitlist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="page-shell">
    <section class="hero-card">

      <div class="brand">
        <span class="brand__word">Solvaro</span>
        <span class="brand__mark">®</span>
      </div>

      <div class="intro">
        <p class="eyebrow">Artist intake waitlist</p>

        <h1>
          Join the Solvaro roster waitlist
        </h1>

        <p class="subtitle">
          Submit your artist details, social links,
          distribution history, and one song for review.
        </p>
      </div>

      <form id="waitlist-form">

        <div class="field-grid">
          <label>
            <span>Full Name</span>

            <input
              type="text"
              name="fullName"
              required
            />
          </label>

          <label>
            <span>Artist Name</span>

            <input
              type="text"
              name="artistName"
              required
            />
          </label>
        </div>

        <div class="field-grid">
          <label>
            <span>Email</span>

            <input
              type="email"
              name="email"
              required
            />
          </label>

          <label>
            <span>Phone Number</span>

            <input
              type="tel"
              name="phone"
              required
            />
          </label>
        </div>

        <label>
          <span>Social Accounts</span>

          <textarea
            name="socials"
            rows="3"
            required
          ></textarea>
        </label>

        <label>
          <span>YouTube Channel</span>

          <input
            type="url"
            name="youtube"
            required
          />
        </label>

        <fieldset>

          <legend>
            Have you released music on Spotify,
            Apple Music, Tidal, or similar platforms?
          </legend>

          <div class="radio-row">

            <label class="radio-card">
              <input
                type="radio"
                name="released"
                value="yes"
                required
              />

              <span>Yes</span>
            </label>

            <label class="radio-card">
              <input
                type="radio"
                name="released"
                value="no"
              />

              <span>No</span>
            </label>

          </div>

        </fieldset>

        <div
          id="spotify-section"
          class="conditional-section"
          style="display:none;"
        >

          <label>
            <span>Spotify Artist Profile</span>

            <input
              id="spotify-profile"
              type="url"
              name="spotifyArtistProfile"
              placeholder="https://open.spotify.com/artist/..."
            />
          </label>

        </div>

        <div
          id="song-section"
          class="conditional-section"
          style="display:none;"
        >

          <label class="upload-box">

            <span>Upload One Song</span>

            <small>
              MP3, WAV, FLAC, or M4A accepted.
            </small>

            <input
              id="song-file"
              type="file"
              name="song"
              accept=".mp3,.wav,.flac,.m4a,audio/mpeg,audio/wav,audio/flac,audio/mp4"
            />

          </label>

        </div>

        <button type="submit">
          Submit to Waitlist
        </button>

      </form>

    </section>

    <footer class="site-footer">
      © 2026 Solvaro. All Rights Reserved
    </footer>

  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
